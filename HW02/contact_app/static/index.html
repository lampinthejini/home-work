<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연락처 관리 서비스</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<section id="authSection">
    <div class="authBox">
        <h1>연락처 관리 서비스</h1>

        <div id="authError" class="errorText"></div>

        <label>아이디</label>
        <input id="authUsername" type="text" placeholder="영문 소문자·숫자 4~20자">

        <label>비밀번호</label>
        <input id="authPassword" type="password" placeholder="4~20자">

        <div id="signupOnlyFields" class="hidden">
            <label>비밀번호 확인</label>
            <input id="authPasswordConfirm" type="password" placeholder="비밀번호 확인">
        </div>

        <button id="loginButton">로그인</button>
        <button id="signupButton" class="hidden">가입하기</button>

        <p id="toggleModeText">
            계정이 없으신가요?
            <a id="toggleModeLink" href="#">회원가입</a>
        </p>
    </div>
</section>

<section id="appSection" class="hidden">
    <header class="appHeader">
        <h1>연락처 관리 서비스</h1>
        <div>
            <span id="currentUsername"></span>님
            <button id="logoutButton">로그아웃</button>
        </div>
    </header>

    <div id="signupSuccessMessage" class="hidden successText"></div>

    <div class="dashboardGrid">
        <div class="leftColumn">
            <section class="contactForm">
                <h2 id="contactFormTitle">연락처 등록</h2>
                <div id="contactFormError" class="errorText"></div>
                <div id="contactSuccessMessage" class="hidden successText"></div>
                <input id="contactName" type="text" placeholder="이름 (1~5자)">
                <input id="contactPhone" type="text" placeholder="전화번호 (01012345678)">
                <input id="contactAddr" type="text" placeholder="주소">
                <select id="contactCategory"></select>
                <button id="contactSubmitButton">추가</button>
                <button id="contactCancelButton" class="hidden">취소</button>
                <input id="contactEditingId" type="hidden">
            </section>

            <section class="searchArea">
                <input id="searchName" type="text" placeholder="이름으로 검색">
                <button id="searchButton">검색</button>
                <button id="searchResetButton">초기화</button>
            </section>

            <section class="contactList">
                <p>총 <span id="contactTotal">0</span>건</p>
                <table>
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>전화번호</th>
                            <th>주소</th>
                            <th>카테고리</th>
                            <th>수정</th>
                            <th>삭제</th>
                        </tr>
                    </thead>
                    <tbody id="contactTableBody"></tbody>
                </table>
            </section>
        </div>

        <div class="rightColumn">
            <section class="categoryArea">
                <h2>카테고리 관리</h2>
                <div id="categoryError" class="errorText"></div>
                <div id="categorySuccessMessage" class="hidden successText"></div>
                <ul id="categoryList"></ul>
                <input id="newCategoryName" type="text" placeholder="새 카테고리 (1~10자)">
                <button id="newCategoryButton">추가</button>
            </section>

            <div id="sessionExpiryEl" class="sessionExpiry"></div>
        </div>
    </div>
</section>

<script src="/static/app.js"></script>
</body>
</html>
